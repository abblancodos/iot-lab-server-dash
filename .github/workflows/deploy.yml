name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: sqlx prepare contra el postgres del compose ───────────────────
  sqlx-prepare:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: cargo sqlx prepare
        working-directory: lab-ctl
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          source ~/.cargo/env
          cargo sqlx prepare

      - name: Commit sqlx cache si cambió
        run: |
          git config user.email "ci@agrodash"
          git config user.name "CI Bot"
          git add lab-ctl/.sqlx
          git diff --cached --quiet || git commit -m "chore: update sqlx cache [skip ci]"
          git push --force-with-lease

  # ── Job 2: build y deploy ─────────────────────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: sqlx-prepare

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build lab-ctl
        working-directory: lab-ctl
        env:
          SQLX_OFFLINE: "true"
        run: |
          source ~/.cargo/env
          cargo build --release

      - name: Copiar binario
        run: |
          sudo mkdir -p /opt/lab-ctl
          sudo cp lab-ctl/target/release/lab-ctl /opt/lab-ctl/lab-ctl
          sudo chmod +x /opt/lab-ctl/lab-ctl

      - name: Copiar sync-config.toml
        run: |
          sudo cp config/sync-config.toml /opt/lab-ctl/sync-config.toml

      - name: Copiar docker-compose.yml
        run: |
          sudo cp docker-compose.yml /opt/agrodash/docker-compose.yml

      - name: Restart lab-ctl
        run: |
          docker compose -f /opt/agrodash/docker-compose.yml stop lab-ctl
          docker compose -f /opt/agrodash/docker-compose.yml up -d lab-ctl